<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — CodeCraft</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/app.js" defer></script>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="navbar-logo">
    <div class="logo-icon">CC</div>
    <span class="logo-text">CodeCraft</span>
  </a>
  <div class="nav-actions">
    <button class="theme-toggle" id="themeToggle">☀️</button>
  </div>
</nav>
<section class="hero" style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center">
  <div>
    <div style="font-family:var(--font-code);font-size:6rem;font-weight:900;background:linear-gradient(90deg,var(--cpp-color),var(--python-color));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:1rem">404</div>
    <h1 style="font-size:1.75rem;font-weight:800;margin-bottom:0.75rem">Page Not Found</h1>
    <p style="color:var(--text-secondary);margin-bottom:2rem">Looks like this lesson doesn't exist yet — or the URL is wrong.</p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
      <a href="../index.html" class="hero-btn hero-btn-cpp">← Home</a>
      <a href="learn.html" class="hero-btn hero-btn-python">Browse Lessons</a>
    </div>
    <div style="margin-top:3rem;font-family:var(--font-code);font-size:0.82rem;color:var(--text-muted)">
      <span class="t-comment" style="color:var(--text-muted)">// error: no such file or directory</span>
    </div>
  </div>
</section>
</body>
</html>
